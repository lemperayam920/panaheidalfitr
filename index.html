<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Wheel Lebaran Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #fbbf24;
            --deep-green: #022c22;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, var(--emerald) 0%, var(--deep-green) 100%);
            color: white;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        .container { position: relative; z-index: 10; text-align: center; width: 100%; }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin: 10px 0; font-size: clamp(32px, 10vw, 55px);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #welcomeText { 
            font-size: 14px; 
            letter-spacing: 2px; 
            color: #fef3c7; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* MEGA WHEEL BOX */
        .wheel-box {
            position: relative;
            width: clamp(320px, 85vw, 480px);
            height: clamp(320px, 85vw, 480px);
            margin: 15px auto;
            border: 12px solid #d97706;
            outline: 5px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 30px rgba(251, 191, 36, 0.3);
            background: var(--gold);
        }

        #wheel {
            width: 100%; height: 100%;
            border-radius: 50%;
            transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1);
        }

        /* Marker Jarum */
        .marker {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            width: 50px; height: 60px;
            background: #e11d48;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            border-top: 4px solid #fff;
        }

        button#spinBtn {
            font-family: 'Montserrat', sans-serif;
            padding: 22px 80px;
            font-size: 24px; font-weight: 900;
            background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
            color: var(--deep-green);
            border: none;
            border-bottom: 6px solid #92400e;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button#spinBtn:hover:not(:disabled) { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            background: #fff;
        }

        button#spinBtn:active { transform: translateY(2px); border-bottom: 2px solid #92400e; }

        button#spinBtn:disabled { 
            background: #4b5563; 
            border-bottom-color: #1f2937; 
            cursor: not-allowed; 
            color: #9ca3af;
        }

        /* MODAL THEME */
        .swal-lebaran-popup {
            background: var(--deep-green) !important;
            border: 4px solid var(--gold) !important;
            color: white !important;
            font-family: 'Montserrat', sans-serif !important;
        }
        .swal-lebaran-title { 
            font-family: 'Playfair Display', serif !important; 
            color: var(--gold) !important; 
            font-size: 32px !important; 
        }

        #fakeNotify {
            position: fixed; bottom: 25px;
            background: white; color: black;
            padding: 12px 25px; border-radius: 8px;
            font-size: 13px; font-weight: 800;
            display: none; z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-left: 10px solid var(--gold);
        }

        /* History Panel */
        .history-panel {
            position: fixed;
            right: 20px; top: 50%;
            transform: translateY(-50%);
            width: 280px; max-height: 400px;
            background: rgba(6, 78, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid var(--gold);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 100;
            overflow: hidden;
        }

        .history-title {
            font-size: 1rem;
            font-weight: 900;
            color: var(--gold);
            text-align: center;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-list {
            max-height: 320px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 8px;
            animation: slideIn 0.5s ease-out;
            font-size: 0.85rem;
        }

        .history-item.current-user {
            background: rgba(251, 191, 36, 0.2);
            border: 2px solid var(--gold);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .history-user {
            font-size: 0.8rem;
            color: #fef3c7;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .history-prize {
            font-size: 0.95rem;
            color: #10b981;
            font-weight: 900;
        }

        .history-time {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }

        @media (max-width: 768px) {
            .history-panel {
                position: relative;
                right: auto; top: auto;
                transform: none;
                width: 90%; max-width: 350px;
                margin: 20px auto;
                max-height: 250px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>SPIN THR</h1>
    <p id="welcomeText">Ambil Keberuntungan Lebaranmu!</p>

    <div class="wheel-box">
        <div class="marker"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn" disabled>MASUKKAN USER ID</button>
</div>

<div id="fakeNotify"></div>

<!-- History Panel -->
<div class="history-panel">
    <div class="history-title">🏆 Pemenang Terbaru</div>
    <div class="history-list" id="historyList"></div>
</div>

<script>
    // ============================================
    // KONFIGURASI
    // ============================================
    
    // CLAIM LINK URL
    const CLAIM_URL = "https://panahitu.com/";
    
    // ============================================
    // PROBABILITY SETTINGS - 4 HADIAH
    // ============================================
    const prizeProbability = {
        '250.000': 10,    // 10% chance (Bronze)
        '500.000': 20,    // 20% chance (Silver)
        '1.000.000': 20,  // 20% chance (Gold)
        '2.000.000': 50   // 50% chance (Diamond) ⭐ PALING TINGGI
    };
    // Total: 100%
    // ============================================
    
    const canvas = document.getElementById("wheel");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    
    // 4 SEGMENTS - 90° each
    const sectors = [
        { label: "250RB", value: "250.000", color: "#064e3b", tier: "bronze" },
        { label: "500RB", value: "500.000", color: "#059669", tier: "silver" },
        { label: "1JT", value: "1.000.000", color: "#064e3b", tier: "gold" },
        { label: "2JT", value: "2.000.000", color: "#059669", tier: "diamond" }
    ];

    const tot = sectors.length; // 4 segments
    const arc = 2 * Math.PI / tot; // 90° in radians
    let currentRotation = 0;
    let username = "";
    let hasSpun = false;

    // ============================================
    // DEVICE SPIN CHECK - 1x per device!
    // ============================================
    function checkDeviceSpinStatus() {
        const spinData = localStorage.getItem('megaWheelSpin');
        if (spinData) {
            const data = JSON.parse(spinData);
            hasSpun = true;
            return data;
        }
        return null;
    }

    function saveSpinToDevice(userId, prize) {
        const spinData = {
            userId: userId,
            prize: prize,
            timestamp: new Date().toISOString()
        };
        localStorage.setItem('megaWheelSpin', JSON.stringify(spinData));
    }
    // ============================================

    // Generate random user ID
    function generateRandomUserId() {
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const numbers = '123456789';
        const firstLetter = letters[Math.floor(Math.random() * letters.length)];
        const lastNumber = numbers[Math.floor(Math.random() * numbers.length)];
        return firstLetter + '****' + lastNumber;
    }

    // Get random prize for fake history
    function getRandomPrize() {
        const prizes = ['250.000', '500.000', '1.000.000', '2.000.000'];
        return prizes[Math.floor(Math.random() * prizes.length)];
    }

    // Format time ago
    function getTimeAgo(seconds) {
        if (seconds < 60) return 'Baru saja';
        const minutes = Math.floor(seconds / 60);
        if (minutes === 1) return '1 menit lalu';
        if (minutes < 60) return minutes + ' menit lalu';
        const hours = Math.floor(minutes / 60);
        if (hours === 1) return '1 jam lalu';
        return hours + ' jam lalu';
    }

    // Add history item
    function addHistoryItem(userId, prize, isCurrentUser = false, timeAgo = 'Baru saja') {
        const historyList = document.getElementById('historyList');
        
        const item = document.createElement('div');
        item.className = 'history-item' + (isCurrentUser ? ' current-user' : '');
        item.innerHTML = `
            <div class="history-user">🎮 ${userId}</div>
            <div class="history-prize">💰 Rp ${prize}</div>
            <div class="history-time">⏰ ${timeAgo}</div>
        `;
        
        if (historyList.firstChild) {
            historyList.insertBefore(item, historyList.firstChild);
        } else {
            historyList.appendChild(item);
        }
        
        while (historyList.children.length > 15) {
            historyList.removeChild(historyList.lastChild);
        }
        
        if (isCurrentUser) {
            historyList.scrollTop = 0;
        }
    }

    // Generate initial history
    function generateInitialHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';
        
        for (let i = 0; i < 8; i++) {
            const userId = generateRandomUserId();
            const prize = getRandomPrize();
            const timeAgo = getTimeAgo(Math.floor(Math.random() * 3600));
            addHistoryItem(userId, prize, false, timeAgo);
        }
    }

    // Auto-generate fake winners
    function startFakeWinners() {
        setInterval(() => {
            const userId = generateRandomUserId();
            const prize = getRandomPrize();
            addHistoryItem(userId, prize, false, 'Baru saja');
        }, 6000); // Every 6 seconds
    }

    // Draw wheel with 4 segments
    function drawWheel() {
        sectors.forEach((sector, i) => {
            const ang = arc * i;
            ctx.save();
            ctx.beginPath();
            ctx.fillStyle = sector.color;
            ctx.moveTo(300, 300);
            ctx.arc(300, 300, 300, ang, ang + arc);
            ctx.lineTo(300, 300);
            ctx.fill();
            ctx.strokeStyle = "rgba(251, 191, 36, 0.5)";
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw text
            ctx.translate(300, 300);
            ctx.rotate(ang + arc / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "900 32px Montserrat";
            ctx.fillText(sector.label, 270, 10);
            ctx.restore();
        });
    }

    window.onload = () => {
        drawWheel();
        generateInitialHistory();
        startFakeWinners();
        
        // Check if device already spun
        const previousSpin = checkDeviceSpinStatus();
        if (previousSpin) {
            // Device already spun - show modal immediately
            Swal.fire({
                icon: 'warning',
                title: 'PERANGKAT TERDAFTAR',
                html: `Perangkat ini sudah pernah spin!<br><br>User: <b>${previousSpin.userId}</b><br>Hadiah: <b>Rp ${previousSpin.prize}</b>`,
                confirmButtonText: 'OK',
                allowOutsideClick: false,
                customClass: { popup: 'swal-lebaran-popup', title: 'swal-lebaran-title' },
                confirmButtonColor: '#fbbf24',
            }).then(() => {
                spinBtn.disabled = true;
                spinBtn.textContent = '⛔ PERANGKAT SUDAH SPIN';
                document.getElementById("welcomeText").innerHTML = `PLAYER: <span style="color:var(--gold)">${previousSpin.userId}</span> (CLAIMED)`;
                
                // Add to history
                addHistoryItem(previousSpin.userId, previousSpin.prize, true, 'Spin kamu');
            });
        } else {
            // First time - ask for user ID
            loginUser();
        }
    };

    function loginUser() {
        Swal.fire({
            title: 'MASUKKAN USER ID',
            input: 'text',
            inputPlaceholder: 'ID AKUN...',
            allowOutsideClick: false,
            confirmButtonText: 'KONFIRMASI',
            customClass: { popup: 'swal-lebaran-popup', title: 'swal-lebaran-title' },
            confirmButtonColor: '#fbbf24',
        }).then((result) => {
            if (result.value) {
                username = result.value.trim().toUpperCase();
                
                // Check device spin status again
                if (checkDeviceSpinStatus()) {
                    Swal.fire({
                        icon: 'error',
                        title: 'ERROR',
                        text: 'Perangkat ini sudah pernah spin!',
                        confirmButtonText: 'OK',
                        customClass: { popup: 'swal-lebaran-popup' }
                    });
                    spinBtn.disabled = true;
                    spinBtn.textContent = '⛔ PERANGKAT SUDAH SPIN';
                } else {
                    document.getElementById("welcomeText").innerHTML = `PLAYER: <span style="color:var(--gold)">${username}</span>`;
                    spinBtn.disabled = false;
                    spinBtn.textContent = 'PUTAR RODA';
                }
            }
        });
    }

    // ============================================
    // WEIGHTED PROBABILITY FUNCTION
    // ============================================
    function selectPrizeByProbability() {
        const rand = Math.random() * 100; // 0-100
        let cumulative = 0;
        
        for (let i = 0; i < sectors.length; i++) {
            const prize = sectors[i].value;
            cumulative += prizeProbability[prize];
            
            if (rand < cumulative) {
                return i; // Return segment index
            }
        }
        
        return 0; // Fallback
    }

    // Calculate target angle for segment
    function getTargetAngle(segmentIndex) {
        // Segments in canvas (starting from 0° = right, counterclockwise):
        // Segment 0 (250RB): 0-90°
        // Segment 1 (500RB): 90-180°
        // Segment 2 (1JT): 180-270°
        // Segment 3 (2JT): 270-360°
        
        // Pointer at top (-90° / 270°)
        // To land segment at pointer, we need to rotate wheel so segment center aligns with 270°
        
        const segmentAngle = 360 / tot; // 90°
        const segmentCenter = (segmentIndex * segmentAngle) + (segmentAngle / 2); // Center of segment
        
        // How much to rotate to align segment center with pointer (270°)
        let targetAngle = 270 - segmentCenter;
        
        // Normalize to 0-360
        while (targetAngle < 0) targetAngle += 360;
        while (targetAngle >= 360) targetAngle -= 360;
        
        return targetAngle;
    }

    // ============================================
    // SPIN FUNCTION
    // ============================================
    spinBtn.onclick = () => {
        if (!username || spinBtn.disabled || hasSpun) return;
        
        // Double check device status
        if (checkDeviceSpinStatus()) {
            Swal.fire({
                icon: 'error',
                title: 'ERROR',
                text: 'Perangkat ini sudah pernah spin!',
                customClass: { popup: 'swal-lebaran-popup' }
            });
            return;
        }

        spinBtn.disabled = true;
        spinBtn.textContent = '🎡 BERPUTAR...';
        
        // Select prize by probability
        const targetSegmentIndex = selectPrizeByProbability();
        const targetAngle = getTargetAngle(targetSegmentIndex);
        
        // Add random variation (±15°)
        const variation = (Math.random() - 0.5) * 30;
        
        // 5-7 full spins + target angle
        const spins = 5 + Math.floor(Math.random() * 3);
        const totalSpin = (spins * 360) + targetAngle + variation;
        
        currentRotation += totalSpin;
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        
        console.log('🎯 SPIN DEBUG:', {
            'targetSegment': targetSegmentIndex,
            'targetPrize': sectors[targetSegmentIndex].label,
            'targetAngle': targetAngle.toFixed(2) + '°',
            'totalRotation': totalSpin.toFixed(2) + '°'
        });

        setTimeout(() => {
            // Calculate which segment landed at pointer
            const netRotation = currentRotation % 360;
            
            // Pointer is at 270° (top)
            // After rotation, which segment is at 270°?
            let angleAtPointer = (270 - netRotation) % 360;
            if (angleAtPointer < 0) angleAtPointer += 360;
            
            // Determine winning segment
            const winningIndex = Math.floor(angleAtPointer / (360 / tot));
            const actualIndex = winningIndex % tot;
            
            const prize = sectors[actualIndex].value;
            const prizeLabel = sectors[actualIndex].label;
            const tier = sectors[actualIndex].tier;
            
            console.log('✅ RESULT:', {
                'netRotation': netRotation.toFixed(2) + '°',
                'angleAtPointer': angleAtPointer.toFixed(2) + '°',
                'winningIndex': actualIndex,
                'prize': prizeLabel,
                'match': actualIndex === targetSegmentIndex ? '✅ MATCH!' : '❌ MISS'
            });
            
            // Confetti based on tier
            const confettiColors = {
                'bronze': ['#cd7f32', '#b87333'],
                'silver': ['#c0c0c0', '#a9a9a9'],
                'gold': ['#ffd700', '#ffc107'],
                'diamond': ['#00bfff', '#1e90ff', '#8a2be2']
            };
            
            confetti({ 
                particleCount: tier === 'diamond' || tier === 'gold' ? 200 : 150, 
                spread: 70, 
                origin: { y: 0.6 }, 
                colors: confettiColors[tier] || ['#fbbf24', '#fff']
            });

            // Save to device - 1x ONLY!
            saveSpinToDevice(username, prize);
            hasSpun = true;
            
            // Add to history
            addHistoryItem(username, prize, true, 'Baru saja');

            Swal.fire({
                title: 'SELAMAT!',
                html: `<div style="font-size:18px">ID ${username} MENANG:</div><br><h1 style="color:var(--gold); font-size:50px; margin:0">Rp ${prize}</h1>`,
                icon: 'success',
                confirmButtonText: 'CLAIM SALDO',
                confirmButtonColor: '#059669',
                allowOutsideClick: false,
                customClass: { popup: 'swal-lebaran-popup', title: 'swal-lebaran-title' }
            }).then(() => {
                window.location.href = CLAIM_URL + "?user=" + username + "&prize=" + prize;
            });
        }, 6100);
    };

    function showFakeNotif() {
        const names = ["USER", "GACOR", "HOKI", "SULTAN", "BOSS"];
        const prizes = ["250.000", "500.000", "1.000.000", "2.000.000"];
        const u = names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*999);
        const p = prizes[Math.floor(Math.random()*prizes.length)];
        const div = document.getElementById("fakeNotify");
        div.innerHTML = `💸 <b>${u}</b> BARU SAJA CLAIM <b>Rp ${p}</b>!`;
        div.style.display = "block";
        setTimeout(() => div.style.display = "none", 3000);
    }
    
    setInterval(showFakeNotif, 8000);
</script>

</body>
</html>
